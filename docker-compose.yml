#   3. Kết nối từ Rider hoặc SSMS: Server=localhost,1433 | User=sa | Password=<SA_PASSWORD>

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: tsms-sqlserver
    restart: unless-stopped
    environment:
      SA_PASSWORD: ${SA_PASSWORD}
      ACCEPT_EULA: "Y"
      MSSQL_PID: Developer
    ports:
      - "1433:1433"
    volumes:
      - tsms-sqlserver-data:/var/opt/mssql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P $${SA_PASSWORD} -Q 'SELECT 1' -C",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  tsms-sqlserver-data:
    name: tsms-sqlserver-data