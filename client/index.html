<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TSMS — Teaching Schedule Management System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Roboto+Mono:wght@500;600&display=swap" rel="stylesheet" />
    <!--
      Loader thuần HTML/CSS nhúng thẳng vào #root — hiển thị NGAY khi HTML về,
      trước khi bundle JS tải/parse xong và React mount. Không có nó thì lần load
      đầu (cache trống) trang sẽ trắng cho tới khi React chạy. Khi createRoot().render()
      chạy, nó thay toàn bộ nội dung #root nên loader tự biến mất, không cần dọn tay.
    -->
    <style>
      #initial-loader {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #FFF7F0;
      }
      #initial-loader .spinner {
        width: 40px;
        height: 40px;
        border: 4px solid #F0E4D8;
        border-top-color: #F45D48;
        border-radius: 50%;
        animation: initial-loader-spin 0.8s linear infinite;
      }
      @keyframes initial-loader-spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="initial-loader">
        <div class="spinner"></div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
